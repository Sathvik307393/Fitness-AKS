<?xml version="1.0" encoding="UTF-8"?>
<svg width="1200" height="850" viewBox="0 0 1200 850" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <linearGradient id="azureBlue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0078D4" />
      <stop offset="100%" stop-color="#00BCF2" />
    </linearGradient>
    <linearGradient id="lightBlue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E5F3FF" />
      <stop offset="100%" stop-color="#B7E0FF" />
    </linearGradient>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2D2D2D" />
    </marker>
  </defs>

  <rect x="20" y="20" width="1160" height="810" rx="24" ry="24" fill="#F4F9FF" stroke="#0078D4" stroke-width="3" />
  <text x="46" y="55" font-size="24" font-weight="700" fill="#0078D4">Cloud-ATS Azure Architecture</text>

  <!-- User and ingress -->
  <g>
    <circle cx="200" cy="110" r="36" fill="#0078D4" />
    <text x="200" y="118" text-anchor="middle" fill="#FFFFFF" font-size="16">User</text>
    <rect x="350" y="80" width="220" height="60" rx="16" ry="16" fill="url(#lightBlue)" stroke="#0078D4" stroke-width="2" />
    <text x="460" y="108" text-anchor="middle" fill="#0078D4" font-size="16" font-weight="700">Application Gateway</text>
    <path d="M236 110 L350 110" stroke="#2D2D2D" stroke-width="3" marker-end="url(#arrowhead)" />
  </g>

  <!-- App layer -->
  <g>
    <rect x="320" y="220" width="300" height="120" rx="20" ry="20" fill="#E5F3FF" stroke="#0078D4" stroke-width="2" />
    <text x="470" y="255" text-anchor="middle" fill="#0078D4" font-size="18" font-weight="700">App Service</text>
    <text x="470" y="280" text-anchor="middle" fill="#2D2D2D" font-size="14">Web UI + API</text>

    <rect x="660" y="220" width="300" height="120" rx="20" ry="20" fill="#E5F3FF" stroke="#0078D4" stroke-width="2" />
    <text x="810" y="255" text-anchor="middle" fill="#0078D4" font-size="18" font-weight="700">Function App</text>
    <text x="810" y="280" text-anchor="middle" fill="#2D2D2D" font-size="14">Blob-triggered resume processor</text>

    <path d="M450 160 L450 220" stroke="#2D2D2D" stroke-width="3" marker-end="url(#arrowhead)" />
    <path d="M470 280 L660 280" stroke="#2D2D2D" stroke-width="3" marker-end="url(#arrowhead)" />
    <path d="M620 160 L810 220" stroke="#2D2D2D" stroke-width="3" marker-end="url(#arrowhead)" />
  </g>

  <!-- Data layer -->
  <g>
    <rect x="120" y="420" width="220" height="120" rx="18" ry="18" fill="#FFFFFF" stroke="#0078D4" stroke-width="2" />
    <text x="230" y="455" text-anchor="middle" fill="#0078D4" font-size="18" font-weight="700">Storage Account</text>
    <text x="230" y="480" text-anchor="middle" fill="#2D2D2D" font-size="14">Blob container</text>

    <rect x="420" y="420" width="220" height="120" rx="18" ry="18" fill="#FFFFFF" stroke="#0078D4" stroke-width="2" />
    <text x="530" y="455" text-anchor="middle" fill="#0078D4" font-size="18" font-weight="700">Cosmos DB</text>
    <text x="530" y="480" text-anchor="middle" fill="#2D2D2D" font-size="14">MongoDB API</text>

    <rect x="720" y="420" width="220" height="120" rx="18" ry="18" fill="#FFFFFF" stroke="#0078D4" stroke-width="2" />
    <text x="830" y="455" text-anchor="middle" fill="#0078D4" font-size="18" font-weight="700">Document Intelligence</text>
    <text x="830" y="480" text-anchor="middle" fill="#2D2D2D" font-size="14">Form Recognizer</text>

    <rect x="920" y="420" width="220" height="120" rx="18" ry="18" fill="#FFFFFF" stroke="#0078D4" stroke-width="2" />
    <text x="1030" y="455" text-anchor="middle" fill="#0078D4" font-size="18" font-weight="700">Key Vault</text>
    <text x="1030" y="480" text-anchor="middle" fill="#2D2D2D" font-size="14">Secrets and keys</text>

    <path d="M470 340 L230 420" stroke="#2D2D2D" stroke-width="3" marker-end="url(#arrowhead)" />
    <path d="M560 340 L560 420" stroke="#2D2D2D" stroke-width="3" marker-end="url(#arrowhead)" />
    <path d="M840 340 L840 420" stroke="#2D2D2D" stroke-width="3" marker-end="url(#arrowhead)" />
    <path d="M840 340 L1030 420" stroke="#2D2D2D" stroke-width="3" marker-end="url(#arrowhead)" />
  </g>

  <!-- Network & security -->
  <g>
    <rect x="80" y="180" width="1060" height="520" rx="28" ry="28" fill="none" stroke="#0078D4" stroke-dasharray="14 10" stroke-width="3" />
    <text x="1100" y="205" text-anchor="end" fill="#0078D4" font-size="16" font-weight="600">Virtual Network</text>

    <rect x="100" y="620" width="320" height="160" rx="20" ry="20" fill="#FFFFFF" stroke="#0078D4" stroke-width="2" />
    <text x="260" y="655" fill="#0078D4" font-size="16" font-weight="700">Private Endpoints</text>
    <text x="260" y="680" fill="#2D2D2D" font-size="14">Storage, Cosmos, Key Vault, DI</text>

    <rect x="460" y="620" width="320" height="160" rx="20" ry="20" fill="#FFFFFF" stroke="#0078D4" stroke-width="2" />
    <text x="620" y="655" fill="#0078D4" font-size="16" font-weight="700">Azure Active Directory</text>
    <text x="620" y="680" fill="#2D2D2D" font-size="14">App registration & auth</text>

    <rect x="820" y="620" width="320" height="160" rx="20" ry="20" fill="#FFFFFF" stroke="#0078D4" stroke-width="2" />
    <text x="980" y="655" fill="#0078D4" font-size="16" font-weight="700">Azure Monitor</text>
    <text x="980" y="680" fill="#2D2D2D" font-size="14">App Insights + Logs</text>

    <path d="M450 480 L450 580" stroke="#2D2D2D" stroke-width="3" marker-end="url(#arrowhead)" />
    <path d="M760 340 L760 520" stroke="#2D2D2D" stroke-width="3" marker-end="url(#arrowhead)" />
    <path d="M760 520 L980 620" stroke="#2D2D2D" stroke-width="2" marker-end="url(#arrowhead)" />
    <path d="M450 520 L620 620" stroke="#2D2D2D" stroke-width="2" marker-end="url(#arrowhead)" />
  </g>

  <!-- Annotations -->
  <text x="100" y="780" fill="#2D2D2D" font-size="14">Note: App Service and Function App use Managed Identity to access Key Vault and Storage securely.</text>
  <text x="100" y="805" fill="#2D2D2D" font-size="14">Note: Private endpoints keep backend services inside the VNet boundary.</text>
</svg>
