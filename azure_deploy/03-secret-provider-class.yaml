apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: azure-kv-fitness-app
  namespace: default
spec:
  provider: azure
  secretObjects:
  # This section creates a regular Kubernetes Secret from the Key Vault data
  # so that the Pod can load it into environment variables easily.
  - secretName: fitness-app-env-secret
    type: Opaque
    data:
    # 'objectName' must match the secret name in Key Vault
    # 'key' will be the name of the environment variable in Kubernetes
    - objectName: cosmos-url
      key: MONGODB_URI
    - objectName: jwt-secret
      key: JWT_SECRET
  parameters:
    usePodIdentity: "false"
    useVMManagedIdentity: "false"
    clientID: "fce1e1d7-6f04-4078-b00f-7a709c3e4113" # Replace with your Client ID
    keyvaultName: "fitness-kv" # Replace with your Key Vault name
    tenantId: "d7c02441-9846-4741-b172-a549e250b870" # You can get this by running: az account show --query tenantId -otsv
    objects: |
      array:
        - |
          objectName: cosmos-url
          objectType: secret
          objectVersion: ""
        - |
          objectName: jwt-secret
          objectType: secret
          objectVersion: ""
